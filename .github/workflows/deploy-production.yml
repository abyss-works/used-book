name: Deploy Production

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  deploy:
    if: github.ref_type == 'branch'
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image with unique tag
        run: |
          TAG="git-${GITHUB_SHA::7}"
          docker build -t "used-book:${TAG}" .
          echo "TAG=${TAG}" >> "${GITHUB_ENV}"

      - name: Load image into kind cluster
        run: |
          kind load docker-image "used-book:${TAG}" --name kind

      - name: Create Aladin API key secret
        env:
          ALADIN_TTB_KEY: ${{ secrets.ALADIN_TTB_KEY }}
        run: |
          kubectl create secret generic aladin-ttb-key \
            --from-literal=ttbkey="${ALADIN_TTB_KEY}" \
            -n usedbook-prod \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update manifest with new image tag
        run: |
          kubectl kustomize k8s/prod/ > /dev/null 2>&1
          sed -i "s|newTag:.*|newTag: ${TAG}|" k8s/prod/kustomization.yaml

      - name: Commit and push manifest change
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/prod/kustomization.yaml
          git commit -m "chore: bump used-book image to ${TAG}"
          git push

      - name: Clean up old images
        run: docker image prune -f --filter "label=project=used-book" 2>/dev/null || true

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build versioned Docker image
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          docker build -t used-book:$VERSION .
          kind load docker-image used-book:$VERSION --name kind

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
