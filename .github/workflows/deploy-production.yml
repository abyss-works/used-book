name: Deploy Production

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  deploy:
    if: github.ref_type == 'branch'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t used-book:prod .

      - name: Load image into kind cluster
        run: kind load docker-image used-book:prod --name kind

      - name: Deploy to prod
        run: |
          kubectl set image deployment/used-book \
            used-book=used-book:prod \
            -n usedbook-prod
          kubectl rollout status deployment/used-book -n usedbook-prod --timeout=180s

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build versioned Docker image
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          docker build -t used-book:$VERSION .
          kind load docker-image used-book:$VERSION --name kind

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
