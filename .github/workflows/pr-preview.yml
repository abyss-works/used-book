name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t used-book:pr-${{ github.event.number }} .

      - name: Load image into kind cluster
        run: kind load docker-image used-book:pr-${{ github.event.number }} --name kind

      - name: Ensure preview namespace and shared DB
        run: |
          kubectl get ns preview 2>/dev/null || kubectl apply -f k8s/preview/ns.yaml
          kubectl get deployment postgres-preview -n preview 2>/dev/null || kubectl apply -f k8s/preview/db/

      - name: Deploy preview to k8s
        run: |
          for f in k8s/preview/app/deployment.yaml k8s/preview/app/service.yaml k8s/preview/app/ingress.yaml; do
            PR_NUMBER=${{ github.event.number }} envsubst < "$f" | kubectl apply -f -
          done

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/used-book-pr-${{ github.event.number }} \
            -n preview --timeout=180s

      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.number }} \
            --repo ${{ github.repository }} \
            --body "🚀 Preview ready: https://used-book-pr-${{ github.event.number }}.abyssworks.dev"

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: self-hosted
    steps:
      - name: Delete preview resources
        run: |
          kubectl delete deployment,service,ingress \
            -l pr-number=${{ github.event.number }} \
            -n preview \
            --ignore-not-found

      - name: Remove Docker image
        run: |
          docker rmi used-book:pr-${{ github.event.number }} || true
