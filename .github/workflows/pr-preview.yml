name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t used-book:pr-${{ github.event.number }} .

      - name: Load image into kind cluster
        run: kind load docker-image used-book:pr-${{ github.event.number }} --name kind

      - name: Deploy preview to k8s
        run: |
          PR_NUMBER=${{ github.event.number }} envsubst < k8s/preview/preview.yaml | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/used-book-pr-${{ github.event.number }} -n preview --timeout=180s

      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENT_ID=$(gh api "/repos/${{ github.repository }}/issues/${{ github.event.number }}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | startswith("🚀 Preview ready"))) | .id' | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api "/repos/${{ github.repository }}/issues/comments/$COMMENT_ID" \
              -f body="🚀 Preview ready: https://used-book-pr-${{ github.event.number }}.abyssworks.dev" \
              -X PATCH
          else
            gh pr comment ${{ github.event.number }} \
              --repo ${{ github.repository }} \
              --body "🚀 Preview ready: https://used-book-pr-${{ github.event.number }}.abyssworks.dev"
          fi

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: [self-hosted]
    steps:
      - name: Delete preview resources
        run: |
          kubectl delete deployment,service,ingress \
            -l pr-number=${{ github.event.number }} \
            -n preview \
            --ignore-not-found

      - name: Remove Docker image
        run: |
          docker rmi used-book:pr-${{ github.event.number }} || true
