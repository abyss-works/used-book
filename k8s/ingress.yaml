apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: used-book
  namespace: usedbook-prod
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: used-book.abyssworks.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: used-book
            port:
              number: 80
