# Preview Deployment — $PR_NUMBER를 PR 번호로 치환하여 사용
# envsubst < k8s/preview/deployment.yaml | kubectl apply -f -
apiVersion: apps/v1
kind: Deployment
metadata:
  name: used-book-pr-${PR_NUMBER}
  namespace: preview
  labels:
    app: used-book-pr
    pr-number: "${PR_NUMBER}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: used-book-pr
      pr-number: "${PR_NUMBER}"
  template:
    metadata:
      labels:
        app: used-book-pr
        pr-number: "${PR_NUMBER}"
    spec:
      containers:
      - name: used-book
        image: used-book:pr-${PR_NUMBER}
        imagePullPolicy: IfNotPresent
        env:
        - name: DB_HOST
          value: postgres-preview.preview.svc.cluster.local
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: postgres
        - name: DB_PASSWORD
          value: postgres
        - name: DB_NAME
          value: usedbook
        - name: PORT
          value: "8080"
        - name: ALADIN_TTB_KEY
          valueFrom:
            secretKeyRef:
              name: aladin-ttb-key
              key: ttbkey
              optional: true
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
