# Preview Service — $PR_NUMBER를 PR 번호로 치환하여 사용
# envsubst < k8s/preview/service.yaml | kubectl apply -f -
apiVersion: v1
kind: Service
metadata:
  name: used-book-pr-${PR_NUMBER}
  namespace: preview
  labels:
    app: used-book-pr
    pr-number: "${PR_NUMBER}"
spec:
  selector:
    app: used-book-pr
    pr-number: "${PR_NUMBER}"
  ports:
  - port: 80
    targetPort: 8080
