---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-preview-pvc
  namespace: preview
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-preview
  namespace: preview
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-preview
  template:
    metadata:
      labels:
        app: postgres-preview
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: POSTGRES_DB
          value: usedbook
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: pgdata
        persistentVolumeClaim:
          claimName: postgres-preview-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-preview
  namespace: preview
spec:
  selector:
    app: postgres-preview
  ports:
  - port: 5432
    targetPort: 5432
